<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hoteles</title>

  <!-- Fuente Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="top-bar">
  <h2>HotelApp 🏨</h2>

  <div class="header-right">

  <div class="currency-box">
    <select id="currencySelector">
      <option value="mxn">MXN (Pesos)</option>
      <option value="usd">USD (Dólares)</option>
    </select>

    <span id="exchangeRateInfo"></span>
  </div>

  <button class="btn-reservas" onclick="viewMyReservations()">Mis Reservas</button>
  <button class="btn-logout" id="logout">Cerrar sesión</button>

</div>
</header>

<section id="adminPanel" style="display:none; padding:20px; background:#f4f4f4;">
  <h3>Panel de Administración</h3>
  <button onclick="mostrarFormulario()">Crear Nuevo Hotel</button>

  <div id="formContainer" style="display:none; margin-top:15px;">
    <input type="text" id="hotelName" placeholder="Nombre">
    <input type="text" id="hotelLocation" placeholder="Ubicación">
    <input type="number" id="hotelPrice" placeholder="Precio">
    <button onclick="crearHotel()">Guardar</button>
  </div>
</section>

<main class="hotel-grid" id="hotelList">
</main>

<div id="hotelModal" class="hotel-modal">
  <div class="hotel-modal-content">
    <span class="close-modal">&times;</span>
    <div id="hotelModalBody"></div>
  </div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script src="js/hotels.js"></script>

</body>
</html>
