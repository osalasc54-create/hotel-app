<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hoteles</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="top-bar">
  <h2>HotelApp 🏨</h2>
  <button id="logout">Cerrar sesión</button>
</header>

<!-- 🔥 PANEL ADMIN -->
<section id="adminPanel" style="display:none; padding:20px; background:#f4f4f4;">
  <h3>Panel de Administración</h3>
  <button onclick="mostrarFormulario()">Crear Nuevo Hotel</button>

  <div id="formContainer" style="display:none; margin-top:15px;">
    <input type="text" id="hotelName" placeholder="Nombre">
    <input type="text" id="hotelLocation" placeholder="Ubicación">
    <input type="number" id="hotelPrice" placeholder="Precio">
    <button onclick="crearHotel()">Guardar</button>
  </div>
</section>

<main class="hotel-grid" id="hotelList">
  <!-- aquí se insertan las cards -->
</main>

<script src="js/hotels.js"></script>

<script src="https://js.stripe.com/v3/"></script>

</body>
</html>
