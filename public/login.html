<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>

  <!-- Fuente Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="login-page auth-body">

  <div class="auth-card">

    <div class="logo-container">
      <img src="images/roomly-logo.svg" alt="Roomly Logo" class="roomly-logo">
    </div>

    <h1 class="login-title">Bienvenido</h1>
    <p class="subtitle">Inicia sesión para continuar</p>

    <form id="loginForm">
      
      <div class="input-group">
        <input type="email" id="email" placeholder="Correo electrónico" required>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Contraseña" required>
      </div>

      <button type="submit" class="login-btn">Entrar</button>

    </form>

    <div class="divider">
      <span>o continúa con</span>
    </div>

    <div id="g_id_onload"
         data-client_id="188558075505-c6al4sge3eri4l09ngqnc141i3e3c4ld.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="continue_with"
         data-shape="rectangular"
         data-logo_alignment="left">
    </div>

    <p class="switch">
      ¿No tienes cuenta?
      <a href="register.html">Regístrate</a>
    </p>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
