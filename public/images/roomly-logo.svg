<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Techo (Roof) -->
  <g id="roof">
    <line x1="80" y1="220" x2="200" y2="120" stroke="#1E90FF" stroke-width="35" stroke-linecap="round"/>
    <line x1="320" y1="220" x2="200" y2="120" stroke="#1E90FF" stroke-width="35" stroke-linecap="round"/>
    <rect x="260" y="120" width="45" height="80" fill="#4A90E2" rx="10"/>
  </g>

  <!-- Escudo (Shield) -->
  <path d="M 200 150 C 200 150 140 190 140 260 C 140 330 200 380 200 380 C 200 380 260 330 260 260 C 260 190 200 150 200 150 Z" 
        fill="#20C997" opacity="0.9"/>

  <!-- Sombra del escudo -->
  <ellipse cx="200" cy="400" rx="70" ry="15" fill="#999" opacity="0.3"/>

  <!-- Ventanas (Windows) -->
  <g id="windows" fill="#FFD700">
    <rect x="175" y="220" width="18" height="18" rx="2"/>
    <rect x="205" y="220" width="18" height="18" rx="2"/>
    <rect x="175" y="250" width="18" height="18" rx="2"/>
    <rect x="205" y="250" width="18" height="18" rx="2"/>
  </g>

  <!-- Círculo en el escudo -->
  <circle cx="200" cy="340" r="12" fill="white"/>

  <!-- Texto ROOMLY -->
  <text x="200" y="500" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle">
    <tspan fill="#0066CC">Room</tspan><tspan fill="#20C997">ly</tspan>
  </text>
</svg>
